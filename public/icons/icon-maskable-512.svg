<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable icon: safe zone is inner 80%, so content fits within ~204x204 centre -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (no rounded corners — OS applies the mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Centred racket, scaled to fit safe zone -->
  <ellipse cx="248" cy="222" rx="90" ry="104" fill="none" stroke="url(#accent)" stroke-width="16"/>
  <rect x="234" y="322" width="28" height="74" rx="14" fill="url(#accent)"/>
  <line x1="162" y1="197" x2="334" y2="197" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="160" y1="228" x2="336" y2="228" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="162" y1="258" x2="334" y2="258" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="170" y1="289" x2="326" y2="289" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="198" y1="120" x2="198" y2="323" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="231" y1="118" x2="231" y2="323" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="264" y1="118" x2="264" y2="323" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <line x1="297" y1="120" x2="297" y2="323" stroke="#34d399" stroke-width="5" opacity="0.6"/>
  <!-- Ball (within safe zone) -->
  <circle cx="370" cy="130" r="36" fill="#fbbf24"/>
  <path d="M337 130 Q370 111 403 130" fill="none" stroke="white" stroke-width="4.5" opacity="0.7"/>
  <path d="M337 130 Q370 149 403 130" fill="none" stroke="white" stroke-width="4.5" opacity="0.7"/>
</svg>
