<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Padel racket shape -->
  <ellipse cx="96" cy="82" rx="42" ry="48" fill="none" stroke="url(#accent)" stroke-width="7"/>
  <!-- Racket handle -->
  <rect x="90" y="128" width="12" height="34" rx="6" fill="url(#accent)"/>
  <!-- Racket strings - horizontal -->
  <line x1="57" y1="72" x2="135" y2="72" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <line x1="55" y1="85" x2="137" y2="85" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <line x1="57" y1="98" x2="135" y2="98" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <line x1="62" y1="111" x2="130" y2="111" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <!-- Racket strings - vertical -->
  <line x1="75" y1="36" x2="75" y2="127" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <line x1="89" y1="34" x2="89" y2="128" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <line x1="103" y1="34" x2="103" y2="128" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <line x1="117" y1="36" x2="117" y2="127" stroke="#34d399" stroke-width="2.5" opacity="0.6"/>
  <!-- Ball -->
  <circle cx="148" cy="44" r="16" fill="#fbbf24"/>
  <path d="M135 44 Q148 36 161 44" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  <path d="M135 44 Q148 52 161 44" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
</svg>
