<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Padel racket shape -->
  <ellipse cx="256" cy="218" rx="112" ry="128" fill="none" stroke="url(#accent)" stroke-width="18"/>
  <!-- Racket handle -->
  <rect x="240" y="342" width="32" height="90" rx="16" fill="url(#accent)"/>
  <!-- Racket strings - horizontal -->
  <line x1="148" y1="192" x2="364" y2="192" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <line x1="145" y1="226" x2="367" y2="226" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <line x1="148" y1="260" x2="364" y2="260" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <line x1="158" y1="294" x2="354" y2="294" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <!-- Racket strings - vertical -->
  <line x1="200" y1="94" x2="200" y2="342" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <line x1="237" y1="90" x2="237" y2="345" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <line x1="274" y1="90" x2="274" y2="345" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <line x1="311" y1="94" x2="311" y2="342" stroke="#34d399" stroke-width="6" opacity="0.6"/>
  <!-- Ball -->
  <circle cx="395" cy="117" r="42" fill="#fbbf24"/>
  <path d="M357 117 Q395 95 433 117" fill="none" stroke="white" stroke-width="5" opacity="0.7"/>
  <path d="M357 117 Q395 139 433 117" fill="none" stroke="white" stroke-width="5" opacity="0.7"/>
